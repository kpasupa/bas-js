// ── stubs for browser-only globals the interpreter touches ──────────────────
window.AudioContext = window.AudioContext || function(){ return { createOscillator:()=>({connect:()=>({connect:()=>{}}),start(){},stop(){},frequency:{},type:''}), createGain:()=>({connect:()=>({connect:()=>{}}),gain:{}}), destination:{}, currentTime:0 }; };
// In-memory file system mock (replaces data/store.js) so file I/O can be tested headless.
window.__fs = {};
const _u8 = (b) => b instanceof Uint8Array ? b : Uint8Array.from(b);
window.isConnected   = () => true;
window.readFile      = async (name) => { if (!(name in window.__fs)) throw new Error('not found: '+name); return window.__fs[name]; };
window.writeRecord   = async (name, rec, size, bytes) => { let d = window.__fs[name] || new Uint8Array(0); const off=(rec-1)*size; if(off+size>d.length){ const nd=new Uint8Array(off+size); nd.set(d); d=nd;} d.set(_u8(bytes), off); window.__fs[name]=d; };
window.writeWholeFile= async (name, bytes) => { window.__fs[name] = _u8(bytes); };
window.openOrCreate  = async (name) => { if(!(name in window.__fs)) window.__fs[name]=new Uint8Array(0); };
window.kill          = async (name) => { delete window.__fs[name]; };
window.rename        = async (o,n) => { window.__fs[n]=window.__fs[o]; delete window.__fs[o]; };
window.listFiles     = async () => Object.keys(window.__fs).map(n=>n.toUpperCase()).sort();

// ── minimal Screen: line-buffer model good enough for sequential PRINT/TAB/LOCATE ──
class TestScreen {
  constructor(){ this.cls(); }
  cls(){ this.lines=[]; this.cur=''; this.col=1; this.row=1; }   // col/row 1-based, like real Screen
  clearTransparent(){ this.cls(); }                              // graphics-mode CLS (transparent cells)
  color(){}
  render(){}
  _ensure(n){ while(this.cur.length<n) this.cur+=' '; }
  locate(r,c){ if(r!=null) this.row=r; if(c!=null){ this.col=c; this._ensure(this.col-1); } }
  tab(n){ this.col=Math.max(1,n); this._ensure(this.col-1); }
  put(text){
    const s=String(text);
    this._ensure(this.col-1);
    this.cur = this.cur.slice(0,this.col-1) + s + this.cur.slice(this.col-1+s.length);
    this.col += s.length;
  }
  newline(){ this.lines.push(this.cur); this.cur=''; this.col=1; this.row++; }
  text(){ return this.lines.concat(this.cur ? [this.cur] : []).join('\n'); }
}

// ── minimal Terminal: feeds canned input lines/keys ──
class TestTerm {
  constructor(inputs, traps){ this.q=(inputs||[]).slice(); this.traps=(traps||[]).slice(); }
  inkey(){ return ''; }
  nextTrap(){ return this.traps.length ? this.traps.shift() : 0; }   // ON KEY trapped function-key #
  async inputKey(){ return this.q.length ? String(this.q.shift())[0] : ' '; }
  // mirror the real terminal: numeric INPUT yields a number, not a string
  async inputLine(opts){ const v = this.q.length ? this.q.shift() : ''; return (opts && (opts.type==='num'||opts.type==='int')) ? (parseFloat(v)||0) : v; }
}

// run one program, return { screen, printer, error }. `files` seeds the in-memory FS (name→string).
// `programs` (name→src) enables CHAIN: the run loop follows chain results like the real app.
async function runProgram(src, inputs=[], files=null, programs=null, opts=null){
  window.__fs = {};
  if (files) for (const k in files) window.__fs[k] = Uint8Array.from(String(files[k]), c=>c.charCodeAt(0)&0xff);
  const scr = new TestScreen();
  const term = new TestTerm(inputs, opts && opts.traps);
  const loader = (name) => programs ? (programs[String(name).trim().toUpperCase()] ?? null) : null;
  const bas = new Basic(scr, term, loader);
  if (opts && opts.now) bas._now = opts.now;     // injectable clock for ON TIMER tests
  // recording mocks for the device backends — verify the interpreter drives them correctly
  // (real audio/canvas can't be checked headless; the sample/untestable/*.BAS are for that).
  const rec = [];
  const mock = (names) => { const o = {}; for (const n of names) o[n] = (...a)=>{ rec.push([n, ...a]); }; return o; };
  bas.audio = mock(['sound','play']);
  bas.gfx = mock(['cls','color','pset','preset','line','circle','paint','palette','setView','setWindow','getImage','putImage','draw']);
  bas.gfx.lastX = 0; bas.gfx.lastY = 0; bas.gfx.mode = 0;
  // pset/line track the "last point" like the real backend (so STEP-relative coords resolve)
  bas.gfx.pset = (x,y,c)=>{ rec.push(['pset',x,y,c]); bas.gfx.lastX=x; bas.gfx.lastY=y; };
  bas.gfx.preset = (x,y,c)=>{ rec.push(['preset',x,y,c]); bas.gfx.lastX=x; bas.gfx.lastY=y; };
  bas.gfx.line = (x1,y1,x2,y2,c,b)=>{ rec.push(['line',x1,y1,x2,y2,c,b]); bas.gfx.lastX=x2; bas.gfx.lastY=y2; };
  bas.gfx.screen = (m)=>{ bas.gfx.mode = m; rec.push(['screen', m]); };   // stateful: drives active()
  bas.gfx.active = ()=> bas.gfx.mode !== 0;
  bas.gfx.point = (x,y)=>{ rec.push(['point',x,y]); return 7; };
  bas.gfx.pmap = (v,n)=>{ rec.push(['pmap',v,n]); return v; };
  bas.gfx.scrn = (r,col)=>{ rec.push(['scrn',r,col]); return 65; };
  bas.gfx.getImage = (...a)=>{ rec.push(['getImage',...a]); return {tag:'img'}; };
  bas.gfx.putImage = (...a)=>{ rec.push(['putImage',...a]); };
  let error = null;
  try {
    let cur = src;
    for (let guard=0; cur!=null && guard<20; guard++){
      const res = await bas.runText(cur);
      if (res && res.t === 'chain') cur = loader(res.name); else break;
    }
  } catch(e){ error = e.message || String(e); }
  return { screen: scr.text(), printer: bas.printer.lines.map(l=>l.text).join('\n'), error, fs: window.__fs, calls: rec };
}
// helper: does the recorded backend-call list contain a call matching [name, ...args]?
const called = (name, ...args) => (r) => r.error ? ('ERR:'+r.error)
  : (r.calls.some(c => c[0]===name && args.every((a,i)=> a===undefined || c[i+1]===a)) ? true
     : `no ${name}(${args.join(',')}) call — got ${JSON.stringify(r.calls)}`);

// ── test registry ───────────────────────────────────────────────────────────
const TESTS = [];
function test(name, src, check, inputs, files, programs, opts){ TESTS.push({ name, src, check, inputs, files, programs, opts }); }
// check(result) → true (pass) or string (fail reason). Helper: expect screen contains.
const has = (sub) => (r) => r.error ? ('ERROR: '+r.error)
  : (r.screen.includes(sub) ? true : `screen lacks ${JSON.stringify(sub)} — got ${JSON.stringify(r.screen)}`);
const eq = (want) => (r) => r.error ? ('ERROR: '+r.error)
  : (r.screen === want ? true : `want ${JSON.stringify(want)} got ${JSON.stringify(r.screen)}`);

// ── runner ───────────────────────────────────────────────────────────────────
(async () => {
  const out = [];
  let pass=0, fail=0;
  for (const t of TESTS){
    let res;
    try { res = await runProgram(t.src, t.inputs, t.files, t.programs, t.opts); }
    catch(e){ res = { error: 'HARNESS: '+(e.message||e) }; }
    const v = t.check(res);
    if (v === true){ pass++; out.push('PASS  '+t.name); }
    else { fail++; out.push('FAIL  '+t.name+'  ::  '+v); }
  }
  out.unshift(`RESULTS  pass=${pass} fail=${fail}  total=${TESTS.length}`);
  out.push(fail===0 ? 'ALL GREEN' : 'HAS FAILURES');
  document.getElementById('out').textContent = out.join('\n');
  document.title = 'DONE ' + (fail===0?'GREEN':'RED');
})();
</script>
