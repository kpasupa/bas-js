<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>bas-js</title>
<link rel="icon" href="src/favicon.png">
<style>

  @font-face {
    font-family: 'Courier MonoThai';
    src: url('courmon.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
    ascent-override: 94%;
    descent-override: 47%;
    size-adjust: 91.645%;
  }
  /* Bundle Consolas so the terminal renders identically on machines without it (macOS, Linux). */
  @font-face {
    font-family: 'Consolas';
    src: url('consola.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
    size-adjust: 100%;
    ascent-override: 94%;
    descent-override: 47%;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center;
         font-family: system-ui, sans-serif; color: #ccc; }

  #screen {
    font-family: 'Consolas','Menlo','Monaco','DejaVu Sans Mono','Courier New',monospace;
    font-size: 18px; line-height: 21px; letter-spacing: 0;
    background: transparent; color: #aaa; padding: 8px; margin: 0;
    white-space: pre; display: inline-block; position: relative; z-index: 2;
    width: 80ch; height: calc(25 * 21px); box-sizing: content-box;
    flex-shrink: 0;
  }
  #screen span { display: inline; }
  .blink        { animation: blink 1s   steps(1) infinite; }
  .cursor-blink { animation: blink 0.6s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  #gate {
    position: fixed; inset: 0; background: #000; z-index: 3;
    display: flex; align-items: center; justify-content: center;
  }
  #gate-pre {
    font-family: 'Consolas','Menlo','Monaco','DejaVu Sans Mono','Courier New',monospace;
    font-size: 18px; line-height: 21px; letter-spacing: 0;
    background: #000; color: #aaa; padding: 8px; margin: 0;
    white-space: pre; display: inline-block;
    width: 80ch; height: calc(25 * 21px); box-sizing: content-box;
    outline: none; overflow: hidden; flex-shrink: 0;
  }
  .gate-sel { background: #aaa; color: #000; }
  .gate-fk  { background: #aaa; color: #000; }

  #esc-hint { position: fixed; bottom: 8px; right: 12px; font-size: 11px; color: #333;
              display: none; pointer-events: none; }
  .thaifont span { font-family: 'Consolas','Menlo','Monaco','Courier MonoThai','Tahoma','Leelawadee UI','Courier New',monospace; }
  #gfx { position: fixed; display: none; image-rendering: pixelated; background: #000; z-index: 1; }
</style>
</head>
<body>
  <pre id="screen" class="thaifont"></pre>
  <canvas id="gfx"></canvas>
  <div id="esc-hint">ESC — back to menu</div>
  <div id="gate"><pre id="gate-pre" class="thaifont" tabindex="0">Loading...</pre></div>

<script>
  const _scr  = document.getElementById('screen');
  const _SKEY = 'bas-js-size';
  const _st   = JSON.parse(localStorage.getItem(_SKEY) || 'null');

  // True when the user hit Ctrl+R / F5 — window is already the right size, skip resizeTo.
  const _isReload = (() => {
    try { return (performance.getEntriesByType('navigation')[0] || {}).type === 'reload'; } catch(e) {}
    try { return performance.navigation.type === 1; } catch(e) {}
    return false;
  })();

  // On first open restore saved size. On reload the size is already correct — calling
  // resizeTo causes the browser to reposition the window (jump to corner).
  if (!_isReload && _st) window.resizeTo(_st.w, _st.h);

  const _scrW = Math.round(_scr.getBoundingClientRect().width);
  const _scrH = Math.round(_scr.getBoundingClientRect().height);

  // Self-calibrating — no platform or DPR guess. resizeTo()/outerWidth use CSS px on some
  // platforms (macOS) and physical px on others (Windows); the factor that converts between
  // them is just outerWidth/innerWidth, measured live. In an --app window the horizontal chrome
  // is ~0, so that ratio is the conversion factor directly (≈1 on macOS, ≈DPR on Windows),
  // correct for any display density — Retina, HiDPI, or plain — without knowing the OS.
  let _resizeTimer = null;
  function fixSize(reason) {
    // Skip resize if any fullscreen is active: programmatic (fullscreenElement) OR
    // F11 browser fullscreen (window fills the entire screen — fullscreenElement stays null).
    if (document.fullscreenElement || document.webkitFullscreenElement ||
        (window.outerWidth === screen.width && window.outerHeight === screen.height)) { console.log('[fixSize] skip — fullscreen'); return; }
    const oW = window.outerWidth, oH = window.outerHeight;
    const iW = window.innerWidth, iH = window.innerHeight;
    if (oW < 5 || oH < 5 || iW < 5 || iH < 5) { console.log('[fixSize] skip — window too small', {oW,oH,iW,iH}); return; }
    const f = oW / iW;
    const r = _scr.getBoundingClientRect();
    const scrW = Math.round(r.width), scrH = Math.round(r.height);
    const w = Math.round(f * scrW + (oW - f * iW));
    const h = Math.round(f * scrH + (oH - f * iH));
    console.log('[fixSize]', reason || 'unknown', { oW, oH, iW, iH, f: f.toFixed(3), scrW, scrH, targetW: w, targetH: h, delta: `${w-oW},${h-oH}` });
    if (Math.abs(w - oW) <= 1 && Math.abs(h - oH) <= 1) { console.log('[fixSize] already correct, skip'); return; }
    const sx = window.screenX, sy = window.screenY;
    window.resizeTo(w, h);
    window.moveTo(sx, sy);
    console.log('[fixSize] resized → after:', { outerW: window.outerWidth, outerH: window.outerHeight });
    localStorage.setItem(_SKEY, JSON.stringify({ w, h }));
  }
  if (!_isReload) fixSize('initial');
  // Re-measure once webfonts load: 80ch is measured against the fallback font until then.
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(() => fixSize('fonts-ready'));
  window.addEventListener('resize', () => {
    clearTimeout(_resizeTimer);
    _resizeTimer = setTimeout(() => fixSize('resize-event'), 150);
  });
  // Resume auto-sizing when exiting fullscreen (F11 or programmatic).
  document.addEventListener('fullscreenchange', () => { if (!document.fullscreenElement) fixSize('fullscreen-exit'); });
  document.addEventListener('webkitfullscreenchange', () => { if (!document.webkitFullscreenElement) fixSize('fullscreen-exit'); });
  window.addEventListener('wheel', e => { if (e.ctrlKey) e.preventDefault(); }, { passive: false });
</script>

</body>
</html>
