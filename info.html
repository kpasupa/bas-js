<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Browser Info</title>
<style>
  body { font-family: monospace; font-size: 14px; background: #111; color: #0f0; padding: 16px; }
  table { border-collapse: collapse; width: 100%; }
  td { padding: 4px 12px; border-bottom: 1px solid #222; }
  td:first-child { color: #aaa; width: 260px; }
  .hi { color: #ff0; }
  #log { margin-top: 20px; color: #888; font-size: 12px; }
</style>
</head>
<body>
<h3 style="color:#ff0;margin:0 0 12px">Browser / Window Info</h3>
<table id="tbl"></table>
<div id="log"></div>

<script>
const tbl = document.getElementById('tbl');
const log = document.getElementById('log');

function row(label, val, hi) {
  const tr = document.createElement('tr');
  tr.innerHTML = `<td>${label}</td><td class="${hi ? 'hi' : ''}">${val}</td>`;
  return tr;
}

function update() {
  tbl.innerHTML = '';
  const dpr = window.devicePixelRatio;
  const zoom = Math.round((dpr / (screen.deviceXDPI ? screen.deviceXDPI / 96 : 1)) * 100) / 100;

  tbl.append(
    row('devicePixelRatio',       dpr.toFixed(4), true),
    row('Estimated page zoom',    Math.round(dpr * 100) + '% (DPR × 100)', true),
    row('window.outerWidth',      window.outerWidth),
    row('window.outerHeight',     window.outerHeight),
    row('window.innerWidth',      window.innerWidth),
    row('window.innerHeight',     window.innerHeight),
    row('outer/inner ratio W',    (window.outerWidth / window.innerWidth).toFixed(4)),
    row('outer/inner ratio H',    (window.outerHeight / window.innerHeight).toFixed(4)),
    row('screen.width',           screen.width),
    row('screen.height',          screen.height),
    row('screen.availWidth',      screen.availWidth),
    row('screen.availHeight',     screen.availHeight),
    row('window.screenX',         window.screenX),
    row('window.screenY',         window.screenY),
    row('document.body scrollW',  document.body.scrollWidth),
    row('document.body scrollH',  document.body.scrollHeight),
    row('visualViewport.scale',   window.visualViewport ? window.visualViewport.scale.toFixed(4) : 'n/a', true),
    row('visualViewport.width',   window.visualViewport ? window.visualViewport.width : 'n/a'),
    row('visualViewport.height',  window.visualViewport ? window.visualViewport.height : 'n/a'),
    row('visualViewport.offsetX', window.visualViewport ? window.visualViewport.offsetX : 'n/a'),
    row('visualViewport.offsetY', window.visualViewport ? window.visualViewport.offsetY : 'n/a'),
  );
}

update();

// Log every resize/zoom event
let t = 0;
function onResize() {
  const ts = ((Date.now() - t) || 0) + 'ms';
  t = Date.now();
  log.innerHTML = `[resize @ ${new Date().toLocaleTimeString()}  +${ts}]  outerW=${window.outerWidth} outerH=${window.outerHeight}  innerW=${window.innerWidth} innerH=${window.innerHeight}  DPR=${window.devicePixelRatio.toFixed(4)}<br>` + log.innerHTML;
  update();
}
window.addEventListener('resize', onResize);
if (window.visualViewport) window.visualViewport.addEventListener('resize', onResize);
</script>
</body>
</html>
