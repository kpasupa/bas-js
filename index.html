<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>bas-js</title>
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center;
         font-family: system-ui, sans-serif; color: #ccc; }
  /* 80×25 terminal */
  #screen {
    font-family: 'Consolas','Menlo','Monaco','DejaVu Sans Mono','Courier New',monospace;
    font-size: 18px; line-height: 1.15; letter-spacing: 0;
    background: #000; color: #aaa; padding: 8px; margin: 0;
    white-space: pre; display: inline-block;
    width: 80ch; height: calc(25 * 1.15em); box-sizing: content-box;
  }
  #screen span { display: inline; }
  .blink { animation: blink 1s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  /* connect overlay — shown only until a folder is connected */
  #gate { position: fixed; inset: 0; display: flex; flex-direction: column; gap: 14px;
          align-items: center; justify-content: center; background: #000; }
  #gate h1 { color: #4ade80; font-size: 20px; margin: 0; letter-spacing: 2px; }
  #gate p { color: #888; font-size: 13px; max-width: 460px; text-align: center; line-height: 1.6; margin: 0; }
  #gate b { color: #ccc; }
  .gate-btns { display: flex; gap: 12px; }
  .btn-primary { font: inherit; font-size: 15px; padding: 10px 22px; border: 1px solid #4ade80;
                 background: #0b0; color: #000; font-weight: 700; border-radius: 6px; cursor: pointer; }
  .btn-primary:hover { opacity: .9; }
  .btn-secondary { font: inherit; font-size: 15px; padding: 10px 22px; border: 1px solid #444;
                   background: transparent; color: #666; border-radius: 6px; cursor: pointer; }
  .btn-secondary:hover { border-color: #888; color: #ccc; }
  #status { color: #fbbf24; font-size: 12px; min-height: 16px; }
  .thaifont span { font-family: 'Consolas','Menlo','Monaco','Tahoma','Leelawadee UI','Courier New',monospace; }
</style>
</head>
<body>
  <pre id="screen" class="thaifont"></pre>

  <div id="gate">
    <h1>bas-js</h1>

    <!-- shown when a folder handle is saved in IDB but permission needs re-granting -->
    <div id="gate-reconnect" style="display:none">
      <p>This script requires readwrite access to folder <b id="folder-name"></b>.<br>
         Change data folder?</p>
      <div class="gate-btns">
        <button id="btn-allow" class="btn-primary">Allow access</button>
        <button id="btn-change" class="btn-secondary">Change folder</button>
      </div>
    </div>

    <!-- shown when no folder has been chosen yet -->
    <div id="gate-first" style="display:none">
      <p>Choose the folder containing your <b>.BAS</b> files and data.</p>
      <button id="btn-pick" class="btn-primary">📂 Choose folder</button>
    </div>

    <div id="status"></div>
  </div>

<script>
  const _scr = document.getElementById('screen');
  const BASE_WIDTH  = Math.round(_scr.getBoundingClientRect().width);
  const _titleBar   = window.outerHeight * (window.innerWidth / window.outerWidth) - window.innerHeight;
  const BASE_HEIGHT = Math.ceil(_scr.getBoundingClientRect().height + _titleBar);

  // Baseline ratio at load: 1 on Windows (logic unchanged), 2 on a Retina Mac. Zoom is
  // measured relative to it, so HiDPI scaling is ignored while browser zoom still counts.
  const BASE_DPR = window.devicePixelRatio || 1;
  function getZoom() { return (window.devicePixelRatio || 1) / BASE_DPR; }

  function fixSize() {
    const zoom = getZoom();
    window.resizeTo(Math.round(BASE_WIDTH * zoom), Math.round(BASE_HEIGHT * zoom));
  }

  fixSize();
  window.addEventListener('resize', fixSize);
</script>

<script type=”module”>
  import { connectAndRun } from './src/app.js';
  import { savedHandle } from './src/data/store.js';

  const originalTitle = document.title;
  const el  = document.getElementById('screen');
  const gate = document.getElementById('gate');
  const statusEl = document.getElementById('status');
  const status  = (t) => { statusEl.textContent = t; };
  const hideGate = () => { gate.style.display = 'none'; el.focus(); document.title = originalTitle + ' - File granted'; };

  // Fetch saved handle immediately (parallel to the reconnect attempt) so gate
  // content is visible as soon as IDB resolves rather than after connectAndRun settles.
  const hPromise = savedHandle();
  hPromise.then(h => {
    if (gate.style.display === 'none') return; // warm reconnect already hid the gate
    if (h) {
      document.getElementById('folder-name').textContent = `”${h.name}”`;
      document.getElementById('gate-reconnect').style.display = '';
      document.getElementById('btn-allow').onclick  = () => connectAndRun(el, status, true, hideGate);
      document.getElementById('btn-change').onclick = () => connectAndRun(el, status, true, hideGate, { forcePick: true });
    } else {
      document.getElementById('gate-first').style.display = '';
      document.getElementById('btn-pick').onclick = () => connectAndRun(el, status, true, hideGate);
    }
  });

  // On load: try silent reconnect (succeeds if browser session still has permission).
  // Title is set only after connectAndRun fails so run.bat never sees a false “Please reconnect”.
  connectAndRun(el, status, false, hideGate).then(async (ok) => {
    if (ok) return;
    const h = await hPromise;
    document.title = originalTitle + (h ? ' - Please reconnect' : ' - Please choose folder');
  });
</script>
</body>
</html>
