<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>bas-js picker</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #111; color: #ccc; font-family: system-ui, sans-serif;
         padding: 32px 24px; }
  h1 { color: #4ade80; font-size: 18px; letter-spacing: 2px; margin: 0 0 24px; }

  /* project list */
  #list { display: flex; flex-direction: column; gap: 10px; max-width: 600px; }
  .project { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px;
             padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
  .project.connected { border-color: #166534; }
  .project-info { flex: 1; min-width: 0; }
  .project-name { font-size: 15px; font-weight: 600; color: #eee; }
  .project-boot { font-size: 12px; color: #555; font-family: Consolas, monospace; margin-top: 2px; }
  .project-status { font-size: 11px; margin-top: 4px; }
  .status-ok   { color: #4ade80; }
  .status-idle { color: #555; }
  .status-err  { color: #f87171; }

  .btn { font: inherit; font-size: 13px; padding: 6px 14px; border-radius: 5px; cursor: pointer; white-space: nowrap; }
  .btn-green  { border: 1px solid #4ade80; background: #0b0; color: #000; font-weight: 700; }
  .btn-green:hover { opacity: .85; }
  .btn-ghost  { border: 1px solid #333; background: transparent; color: #666; }
  .btn-ghost:hover { border-color: #666; color: #ccc; }
  .btn-danger { border: 1px solid #7f1d1d; background: transparent; color: #f87171; }
  .btn-danger:hover { background: #7f1d1d22; }
  .btn-add    { border: 1px solid #4ade80; background: transparent; color: #4ade80;
                font-size: 14px; padding: 9px 18px; border-radius: 6px; cursor: pointer; margin-bottom: 16px; }
  .btn-add:hover { background: #4ade8011; }

  /* add form */
  #add-form { display: none; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px;
              padding: 16px; max-width: 600px; margin-bottom: 16px; }
  #add-form label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; }
  #add-form .folder-picked { font-family: Consolas, monospace; font-size: 13px; color: #4ade80;
                              background: #0a0a0a; border: 1px solid #2a2a2a; border-radius: 4px;
                              padding: 6px 10px; margin-bottom: 12px; }
  #add-form input { width: 100%; background: #0a0a0a; border: 1px solid #333; color: #eee;
                    font: inherit; font-size: 14px; padding: 7px 10px; border-radius: 4px;
                    margin-bottom: 12px; outline: none; }
  #add-form input:focus { border-color: #4ade80; }
  .form-row { display: flex; gap: 8px; }

  #empty { color: #444; font-size: 13px; margin: 8px 0; }
</style>
</head>
<body>
<h1>bas-js picker</h1>

<button class="btn-add" id="btn-add">＋ Add folder</button>

<div id="add-form">
  <label>Folder</label>
  <div class="folder-picked" id="form-folder">—</div>
  <label>Boot file</label>
  <input id="form-boot" type="text" placeholder="PASSWORD" value="PASSWORD" spellcheck="false">
  <div class="form-row">
    <button class="btn btn-green" id="form-save">Save</button>
    <button class="btn btn-ghost" id="form-cancel">Cancel</button>
  </div>
</div>

<div id="list"><div id="empty">No folders saved yet.</div></div>

<script>
  const IDB_NAME = 'cheque-js', IDB_STORE = 'handles', IDB_KEY = 'projects';

  function openIDB() {
    return new Promise((res, rej) => {
      const r = indexedDB.open(IDB_NAME, 1);
      r.onupgradeneeded = () => r.result.createObjectStore(IDB_STORE);
      r.onsuccess = () => res(r.result);
      r.onerror   = () => rej(r.error);
    });
  }
  async function idbGet(key) {
    const db = await openIDB();
    return new Promise((res, rej) => {
      const q = db.transaction(IDB_STORE, 'readonly').objectStore(IDB_STORE).get(key);
      q.onsuccess = () => res(q.result ?? null);
      q.onerror   = () => rej(q.error);
    });
  }
  async function idbSet(key, val) {
    const db = await openIDB();
    return new Promise((res, rej) => {
      const t = db.transaction(IDB_STORE, 'readwrite');
      t.objectStore(IDB_STORE).put(val, key);
      t.oncomplete = res; t.onerror = () => rej(t.error);
    });
  }

  // ── state ─────────────────────────────────────────────────────────────────
  let projects = []; // [{ handle, boot, name }]

  async function load() {
    projects = (await idbGet(IDB_KEY)) ?? [];
    render();
  }
  async function save() {
    await idbSet(IDB_KEY, projects);
  }

  // ── render ────────────────────────────────────────────────────────────────
  function render() {
    const list = document.getElementById('list');
    list.innerHTML = '';
    if (!projects.length) {
      list.innerHTML = '<div id="empty">No folders saved yet.</div>';
      return;
    }
    projects.forEach((p, i) => {
      const el = document.createElement('div');
      el.className = 'project';
      el.dataset.i = i;
      el.innerHTML = `
        <div class="project-info">
          <div class="project-name">${esc(p.name)}</div>
          <div class="project-boot">${esc(p.boot)}.BAS</div>
          <div class="project-status status-idle" id="st-${i}">—</div>
        </div>
        <button class="btn btn-green btn-connect" data-i="${i}">Connect</button>
        <button class="btn btn-ghost btn-edit"    data-i="${i}">Edit</button>
        <button class="btn btn-danger btn-remove" data-i="${i}">Remove</button>`;
      list.appendChild(el);
      // check current permission silently
      p.handle.queryPermission({ mode: 'readwrite' }).then(perm => {
        const st = document.getElementById(`st-${i}`);
        if (!st) return;
        if (perm === 'granted') { st.textContent = 'connected ✓'; st.className = 'project-status status-ok'; el.classList.add('connected'); }
        else                    { st.textContent = 'needs re-grant'; st.className = 'project-status status-idle'; }
      });
    });
  }

  function esc(s) { return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  // ── list events ───────────────────────────────────────────────────────────
  document.getElementById('list').addEventListener('click', async e => {
    const btn = e.target.closest('button');
    if (!btn) return;
    const i = +btn.dataset.i;
    const p = projects[i];
    const st = document.getElementById(`st-${i}`);

    if (btn.classList.contains('btn-connect')) {
      try {
        const perm = await p.handle.requestPermission({ mode: 'readwrite' });
        if (perm === 'granted') {
          await idbSet('active', { handle: p.handle, boot: p.boot, name: p.name });
          window.location.href = 'index.html';
        } else {
          st.textContent = 'denied'; st.className = 'project-status status-err';
        }
      } catch(e) { st.textContent = 'error: ' + e.message; st.className = 'project-status status-err'; }
    }

    if (btn.classList.contains('btn-edit')) {
      const newBoot = prompt('Boot file name (without .BAS):', p.boot);
      if (newBoot !== null && newBoot.trim()) {
        projects[i].boot = newBoot.trim().toUpperCase();
        await save();
        render();
      }
    }

    if (btn.classList.contains('btn-remove')) {
      if (confirm(`Remove "${p.name}" from the list?`)) {
        projects.splice(i, 1);
        await save();
        render();
      }
    }
  });

  // ── add form ──────────────────────────────────────────────────────────────
  let pendingHandle = null;

  document.getElementById('btn-add').onclick = async () => {
    try {
      pendingHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
      document.getElementById('form-folder').textContent = pendingHandle.name;
      document.getElementById('form-boot').value = 'PASSWORD';
      document.getElementById('add-form').style.display = 'block';
      document.getElementById('form-boot').focus();
      document.getElementById('form-boot').select();
    } catch (e) {
      if (e.name !== 'AbortError') alert('Error: ' + e.message);
    }
  };

  document.getElementById('form-save').onclick = async () => {
    if (!pendingHandle) return;
    const boot = document.getElementById('form-boot').value.trim().toUpperCase() || 'PASSWORD';
    // avoid duplicate folder names
    const exists = projects.findIndex(p => p.name === pendingHandle.name);
    if (exists >= 0) {
      projects[exists] = { handle: pendingHandle, boot, name: pendingHandle.name };
    } else {
      projects.push({ handle: pendingHandle, boot, name: pendingHandle.name });
    }
    await save();
    pendingHandle = null;
    document.getElementById('add-form').style.display = 'none';
    render();
  };

  document.getElementById('form-cancel').onclick = () => {
    pendingHandle = null;
    document.getElementById('add-form').style.display = 'none';
  };

  // ── init ──────────────────────────────────────────────────────────────────
  load();
</script>
</body>
</html>
